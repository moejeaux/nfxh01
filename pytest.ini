[pytest]
markers =
    live: marks tests that call real Hyperliquid mainnet API (run deliberately)
    asyncio: async tests (pytest-asyncio; optional explicit mark)
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests src
# Repo root so `import src.*` resolves to ./src/ (portable; avoids py3.14/mac issues with pythonpath=src).
pythonpath = .
