# Merged under config root as btc_strategy: (see load_config). All thresholds are referenced from code via this namespace.
# Risk gates: percentages use reference_capital_usd if set (match live HL equity), else risk.total_capital_usd from main config.yaml.
detector_version: "1.0.2"

thresholds:
  trend_min: 0.006
  vol_trend: 1.25
  extreme_dist_min: 0.011
  extreme_dist_max: 0.016
  ema_1h_period: 50
  ema_4h_period: 50
  ema_5m_20: 20
  ema_5m_50: 50
  atr_5m_period: 14
  atr_15m_period: 14
  atr_median_lookback: 20
  hysteresis_ticks: 5
  swing_bars: 5
  structure_bars_5m: 20

supervisor:
  trend_min_confidence: 0.65

lanes:
  trend:
    # Same floor as growi_hf: safety_mode mult × size must stay ≥ acp.min_trade_size_usd.
    position_size_usd: 25.0
    stop_atr_5m_mult: 1.6
    take_profit_r: 1.0
    range_high_lookback_bars: 14
  regression:
    position_size_usd: 25.0
    stop_atr_5m_mult: 1.2
    take_profit_r: 1.0
    rsi_period: 14
    rsi_extreme: 74.0

risk_gates:
  # HL clearing wallet (for ops); does not replace USD equity for pct gates.
  wallet_address: "0x68c40e9385506195129522c650a510aa07f07732"
  # Live account equity in USD for pct caps; null = use risk.total_capital_usd from config.yaml.
  reference_capital_usd: null
  max_daily_loss_pct_of_capital: 0.02
  max_btc_gross_pct_of_capital: 0.30
  # Optional hard USD ceilings (applied if set; otherwise only percentages apply).
  max_daily_loss_usd_btc_engine: null
  max_btc_gross_usd: null

data:
  intervals:
    - "1h"
    - "15m"
    - "5m"
  min_bars_1h: 60
  min_bars_15m: 48
  min_bars_5m: 60
