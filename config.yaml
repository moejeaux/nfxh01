# Numeric thresholds for strategy directives — do not hardcode these in code paths.
#
# Multi-strategy orchestration: global tick sleeps ``tick_interval_seconds``; each strategy
# runs only when its own ``cycle_interval_seconds`` has elapsed (see ``strategies``).

hyperliquid_api:
  api_base_url: "https://api.hyperliquid.xyz"
  # Space between all HL REST posts. AceVault pulls ~cap+2 /info calls per scan; raise if 429 persists.
  min_interval_ms: 175
  # Growi/MC call all_mids() inside per-coin loops; cache avoids ~100 duplicate allMids POSTs per tick.
  mids_cache_ttl_seconds: 5.0
  max_retries_on_429: 8
  backoff_base_seconds: 1.25
  backoff_max_seconds: 120.0
  backoff_jitter_ratio: 0.35

execution:
  max_spread_bps: 12
  max_slippage_bps: 15
  max_total_round_trip_cost_bps: 35
  entry_fee_bps: 4
  exit_fee_bps: 4
  fallback_spread_bps: 10
  fallback_slippage_bps: 12

universe:
  enabled: true
  top_n: 25
  refresh_seconds: 600
  block_new_entries_outside_universe: true
  allow_exit_management_outside_universe: true

# Shared market-aware opportunity pipeline (AceVault, Growi HF, MC Recovery).
# When ``enabled: true`` and ``shadow_mode: false``, Top-25 is no longer the primary gate:
# use ``emergency_universe.mode: strict_allowlist`` to re-enable allowlist blocking at risk layer.
opportunity:
  enabled: true
  shadow_mode: false
  context_refresh_seconds: 15
  require_valid_snapshot: true
  acevault_rank_pool_size: 24
  emergency_universe:
    mode: off
  alpha:
    acevault:
      min_raw: 0.0
      max_raw: 2.5
    growi_hf:
      min_raw: 0.0
      max_raw: 50.0
    mc_recovery:
      min_raw: 0.0
      max_raw: 80.0
  hard_reject:
    min_day_ntl_vlm_usd: 150000
    min_open_interest_usd: 75000
    require_mid_px: true
    require_impact_pxs: true
    max_half_spread_pct: 0.85
    max_abs_funding: 0.00195
    max_abs_premium_pct: 2.8
    reject_only_isolated: false
  liquidity:
    vlm_ref_usd: 5000000
    oi_ref_usd: 2000000
    impact_k: 10.0
    min_liq_mult: 0.06
    weights:
      volume: 0.55
      open_interest: 0.45
  regime:
    default_mult: 1.0
    by_engine:
      acevault:
        trending: 1.05
        ranging: 0.95
        panic: 0.85
      growi:
        trending: 1.0
        ranging: 1.08
        panic: 0.92
      mc:
        trending: 0.98
        ranging: 1.0
        panic: 1.02
  cost:
    impact_k: 12.0
    funding_k: 5200.0
    premium_k: 0.22
    min_cost_mult: 0.02
    floors:
      impact: 0.00012
      funding: 0.0
      premium: 0.0
  final_score:
    min_submit_score: 0.12
    top_k_per_cycle: 12
  tiering:
    tier1_min_liq_mult: 1.0
    tier2_min_liq_mult: 0.42
  leverage:
    enabled: true
    top_target_x: 10.0
    tier_caps:
      tier1: 10.0
      tier2: 5.0
      tier3: 0.0
    confidence_bands:
      elite_min_score: 0.62
      strong_min_score: 0.36
      medium_min_score: 0.2
    by_band:
      "1":
        elite: 10.0
        strong: 7.0
        medium: 4.5
        weak: 1.0
      "2":
        elite: 5.0
        strong: 3.5
        medium: 2.0
        weak: 1.0
    portfolio_caps:
      high_leverage_threshold_x: 5
      max_high_leverage_positions: 3
      max_high_leverage_gross_usd: 28000.0

research:
  enabled: true
  data_dir: "data/research"
  # Phase 1 weekly review: default dirs (override with CLI --archive-dir / --output-dir).
  weekly_review_archive_dir: "data/research/hl_meta_archive"
  weekly_review_output_dir: "data/research/weekly_review_out"
  weekly_review_snap_filename: "snap.jsonl"
  weekly_review_info_timeout_seconds: 30
  save_candidate_logs: true
  save_trade_outcomes: true

calibration:
  enabled: true
  recompute_mode: recommend_only
  min_trades_for_update: 75
  lookback_days: 45
  target_metrics:
    - realized_net_pnl
    - profit_factor
    - slippage_adjusted_expectancy

database:
  pool_min_size: 1
  pool_max_size: 4

orchestration:
  tick_interval_seconds: 15
  # When true, post-conflict NormalizedEntryIntent list is executed via UnifiedRiskLayer + DegenClaw.
  track_a_execution_enabled: true
  # If HL_WALLET_ADDRESS is set: pull unknown venue positions into ``recovered`` engine (safe import).
  hl_sync_on_startup: false
  # Log RISK_RECONCILE_* when in-memory opens disagree with HL (does not mutate state).
  hl_reconcile_on_startup: false
  execution_order:
    - acevault
    - growi_hf
    - mc_recovery
    - btc_lanes
  conflict:
    mode: skip_opposing
    priority:
      - acevault
      - growi_hf
      - mc_recovery
      - btc_lanes

strategies:
  acevault:
    enabled: true
    engine_id: acevault
    exits:
      regime:
        close_all_on_trending_up: true
        min_seconds_in_trending_up_before_close_all: 120
        min_confidence_before_close_all: 0.75
        min_consecutive_trending_up_observations: 3
        mass_exit_cooldown_seconds: 300
  growi_hf:
    enabled: true
    engine_id: growi
    cycle_interval_seconds: 60
    max_candidates: 10
    default_leverage: 1
  mc_recovery:
    enabled: true
    engine_id: mc
    cycle_interval_seconds: 120
    max_candidates: 3
    default_leverage: 1
  btc_lanes:
    enabled: true
    engine_id: btc_lanes
    cycle_interval_seconds: 60
    default_leverage: 1

engines:
  planned_count: 5
  acevault_engine_id: 1
  acevault:
    loss_pct: 0.03
    cooldown_hours: 4
  growi:
    loss_pct: 0.04
    cooldown_hours: 6
  mc:
    loss_pct: 0.02
    cooldown_hours: 2
  anticze:
    loss_pct: 0.02
    cooldown_hours: 8
  eternal:
    loss_pct: 0.02
    cooldown_hours: 12
  btc_lanes:
    loss_pct: 0.03
    cooldown_hours: 4

acevault:
  # Random subset of scannable perps per cycle (candle fetches). Cuts HL /info volume; null = full universe.
  max_coins_to_evaluate: 72
  default_position_size_usd: 25
  # Fixed distance from entry to stop (percent). Immutable after position creation; risk layer rejects widening.
  # Tightened per Fathom retrospective (ranging-market loss cluster); stay at or below 0.3% ceiling.
  stop_loss_distance_pct: 0.28
  take_profit_distance_pct: 2.7
  max_candidates: 5
  min_weakness_score: 0.38
  # Stricter weakness required when regime is ranging (range-aware entry).
  ranging_min_weakness_score: 0.45
  min_volume_ratio: 0.88
  max_concurrent_positions: 5
  max_hold_minutes: 240
  cycle_interval_seconds: 15
  verification_size_usd: 50
  regime_weights:
    trending_up: 0.4
    trending_down: 0.9
    ranging: 0.6
    risk_off: 1.0
  # Same-coin re-entry after AceVault stop_loss: block for cooldown window (acevault engine only).
  # Precedence: if reentry_stop_loss_cooldown_seconds is a number, it wins; else candles × interval (default 10×60s=600s).
  reentry_stop_loss_cooldown_candles: 10
  reentry_stop_loss_candle_interval_seconds: 60
  reentry_stop_loss_cooldown_seconds: null
  ranging_trade:
    ranging_bar_interval_seconds: 300
    range_geometry_lookback_bars: 24
    atr_period_bars: 14
    midpoint_no_trade_fraction: 0.35
    min_distance_to_range_edge_for_entry: 0.15
    bars_cooldown_after_loss: 8
    loss_cooldown_exit_reasons:
      - stop_loss
      - time_stop
      - trailing_stop
    reentry_reset_require_opposite_edge: true
    reentry_reset_buffer_frac_of_width: 0.02
    min_expected_move_to_cost_ratio: 2.0
    initial_stop_ATR_multiple: 1.1
    taker_fee_roundtrip_pct: 0.07
    spread_slippage_budget_pct: 0.06
  # Regime-specific exit overrides merge on top of global ``exits`` defaults.
  # Partial TP is capability-gated: setting enabled: true will fail validation
  # until ACP/DegenClaw exposes a sized partial-close contract.
  exit_overrides:
    ranging:
      take_profit_distance_pct: 1.0
      breakeven_activation_R: 0.65
      trailing_activation_R: 1.0
      trailing_atr_multiple: 0.65
      max_hold_bars_in_range: 10
      hard_target_r_cap: 2.2
      time_to_fail_bars_before_tighter_invalidation: 6
      fail_fast:
        max_progress_r: 0.15
      range_target:
        enabled: true
        buffer_frac_of_width: 0.02
        precedence: before_fixed_tp
      break_even:
        enabled: true
        offset_r: 0.10
      partial_tp:
        enabled: false
        levels:
          - trigger_r: 1.0
            size_fraction: 0.60
          - trigger_r: 2.0
            size_fraction: 0.20
      trailing:
        enabled: true
        activate_at_r: 1.25
        distance_r: 0.9
      time_stop:
        minutes: 35
        min_progress_r: 0.35

growi_hf:
  default_position_size_usd: 20
  stop_loss_distance_pct: 0.35
  take_profit_distance_pct: 1.2
  rsi_period: 14
  rsi_oversold: 30
  rsi_overbought: 70
  min_bars: 40
  candle_interval: "5m"
  # Each coin = one candles_snapshot POST; keep modest vs HL limits (AceVault already scans many coins).
  max_coins_to_evaluate: 40
  max_concurrent_positions: 4
  regime_allow:
    - ranging
    - trending_down
    - risk_off

mc_recovery:
  default_position_size_usd: 35
  stop_loss_distance_pct: 0.45
  take_profit_distance_pct: 2.0
  lookback_high_bars: 48
  min_drop_from_high_pct: 3.5
  rsi_period: 14
  rsi_max_for_entry: 38
  min_bars: 50
  candle_interval: "5m"
  volume_ma_period: 20
  min_volume_ratio: 0.85
  max_coins_to_evaluate: 40
  max_concurrent_positions: 2
  regime_allow:
    - trending_down
    - risk_off
    - ranging

fathom:
  enabled: true
  # Per-exit post-trade blurbs (3b); six-hour strategy review uses fathom_retrospective.deep_model (14b).
  model: llama3.2:3b
  fast_model: llama3.2:3b
  post_analysis_timeout_seconds: 180
  # Fast-path entry advisor vs retrospective 14B — separate budgets (decision doc).
  entry_timeout_seconds: 15
  retro_timeout_seconds: 600
  timeout_seconds: 30
  # Advisory size factor for AceVault entries (applied after safety mode). Bounds must match prompts/parser.
  acevault_min_mult: 0.90
  acevault_max_mult: 1.15
  majors_max_mult: 1.68

intelligence:
  enabled: false
  provider: fathom
  model: fathom-14b
  timeout_seconds: 60
  topk_review:
    enabled: false
    top_k: 5
    advisory_only: true
    write_artifacts: true
    invoke_when:
      score_gap_below: 0.08
      min_leverage_proposal: 3
      low_confidence_only: false
      max_calls_per_cycle: 1
      max_calls_per_hour: 60
  weekly_summary:
    enabled: true
    max_recommendations: 2
    require_structured_output: true
    write_markdown: true

# Unified retrospective service (shallow + deep); single scheduler, lock, registry pipeline.
retro:
  enabled: true
  embed_in_main_process: true
  shallow_interval_minutes: 60
  deep_interval_hours: 6
  initial_delay_seconds: 120
  catch_up_min_delay_seconds: 5
  advisor_schema_version: 1
  # Temperature for schema-repair Ollama retries only (first call uses ``temperature`` below).
  advisor_retry_temperature: 0.0
  config_schema_version: 1
  # Ollama /api/chat: ask for JSON mode (reduces prose-only responses). Set false if API errors.
  ollama_json_response_format: true
  deep_model: fathom-r1-14b
  shallow_lookback_hours: 2
  deep_lookback_hours: 6
  max_decision_rows: 200
  max_decisions_prompt_chars: 12000
  num_predict: 2048
  temperature: 0.2
  previous_runs_in_prompt: 1
  healthy_gate:
    min_closing_trades: 30
    recent_pf_floor: 1.2
    global_pf_floor: 1.0
    max_fee_drag_pct: 0.5
    cooldown_minutes_after_change: 0
  # Hyperliquid perps taker fee (0.035% per side = 3.5 bps). Used by
  # DecisionJournal.log_exit to persist an estimated fee_paid_usd until the
  # executor surfaces realized fill fees. Set to null to disable the estimate.
  fee_estimation:
    taker_bps_per_side: 3.5
  # Phase 2b: Worst-PF (profit factor) candidates for auto-disable advisor signal.
  # worst_pf_candidate_min_trades: only coins with >= N closed trades considered.
  # worst_pf_limit: top N worst-PF coins surfaced to advisor in prompt.
  worst_pf_candidate_min_trades: 10
  worst_pf_limit: 8
  telegram_notify: false
  telegram_message_max_chars: 3500

learning:
  disabled_coins: []
  reload_runtime_config_after_apply: true
  # Graduation PF floor for safety mode (see risk.safety_mode); risk block takes precedence when both set.
  min_profit_factor_before_leaving_safety_mode: 1.02
  min_trades_before_auto_apply: 30
  max_changes_per_cycle: 1
  cooldown_trades_after_change: 25
  inconclusive_timeout_days: 7
  evaluation_trade_checkpoints: [25, 50, 100]
  evaluation_max_closed_rows: 50000
  improve_pf_ratio: 1.05
  auto_apply_min_confidence: 0.75
  revert_pf_worsen_ratio: 0.85
  # reduce_fathom_acevault_max_mult: factor in (0,1) × current; never above floor.
  fathom_acevault_max_mult_floor: 1.0
  fathom_acevault_max_mult_reduce_factor_default: 0.9

exits:
  enabled: true
  track_a:
    enabled: true
  hard_stop:
    enabled: true
  break_even:
    enabled: true
    trigger_r: 1.0
    offset_r: 0.05
  time_stop:
    enabled: true
    minutes: 45
    min_progress_r: 0.3
  partial_tp:
    enabled: false
    levels: []
  trailing:
    enabled: true
    activate_at_r: 1.0
    distance_r: 0.75

fathom_retrospective:
  enabled: true
  # Legacy block: unified retro reads these when retro.* keys omit values.
  embed_in_main_process: true
  run_interval_hours: 6
  initial_delay_seconds: 120
  catch_up_min_delay_seconds: 5
  deep_model: fathom-r1-14b
  lookback_hours: 6
  max_decision_rows: 200
  max_decisions_prompt_chars: 12000
  timeout_seconds: 600
  num_predict: 2048
  temperature: 0.2
  previous_runs_in_prompt: 1
  telegram_notify: true
  telegram_message_max_chars: 3500

regime:
  btc_1h_risk_off_threshold: -0.02
  btc_vol_risk_off_threshold: 0.008
  btc_4h_trend_threshold: 0.015
  btc_vol_trend_threshold: 0.006
  min_transition_interval_minutes: 15
  data_fetch_interval_seconds: 60
  ranging_classifier:
    htf_slope_lookback_bars: 24
    max_trend_slope_for_range: 0.0008
    range_lookback_bars: 24
    atr_period_bars: 14
    min_range_width_relative_to_ATR: 1.35
    min_recent_bounces_at_range_edges: 2
    bounce_edge_tolerance_frac: 0.12
    max_vol_expansion_for_range: 1.6
    expansion_short_bars: 4
    expansion_long_bars: 24
    trend_agreement_min_slope_norm: 0.0002
    trend_agreement_min_4h_return: 0.004

# ACP v2: Python calls the Node buyer service (services/acp-buyer) when ACP_SDK_URL is set.
acp:
  min_trade_size_usd: 10
  http_timeout_seconds: 120
  offering_name: perp_trade
  sdk_url: ""

cascade_forecaster:
  enabled: true
  # BTC book depth is the primary liquidity vacuum probe.
  book_probe_coin: BTC
  # Sub-signal weights (must sum to ~1.0).
  weights:
    oi_delta: 0.30
    funding: 0.20
    premium: 0.15
    oi_cap: 0.10
    book_thin: 0.25
  # Normalization denominators — signal / norm → [0,1] before weighting.
  normalization:
    oi_delta_extreme_pct: 0.05
    funding_extreme: 0.001
    premium_extreme: 0.005
    # Per-asset mark/oracle mismatch cap before aggregation (stale oracle / micro caps).
    premium_per_asset_cap: 0.05
    # Aggregation over capped per-asset ratios: p95 | max | mean_top_n
    premium_aggregation: p95
    premium_mean_top_n: 10
    oi_cap_extreme_count: 10
  # Score → level classification boundaries.
  thresholds:
    low: 0.15
    elevated: 0.40
    high: 0.65
    critical: 0.85

verification:
  shadow_mode_enabled: false
  shadow_cycles: 1

risk:
  # UnifiedRiskLayer is mandatory before any order reaches execution; no bypass flags.
  risk_per_trade_pct: 0.0025
  max_position_size_usd: 150
  min_position_size_usd: 25
  total_capital_usd: 10000
  max_portfolio_drawdown_24h: 0.05
  max_gross_multiplier: 1.5
  # null = no limit on correlated long count (tune later if needed).
  max_correlated_longs: null
  # null = no limit on correlated short count; integer = hard cap across all engines.
  max_correlated_shorts: null
  min_available_capital_usd: 10.50
  # Until last N closed AceVault trades meet PF + avg win/avg |loss| thresholds, scale entries by position_multiplier.
  safety_mode:
    enabled: true
    position_multiplier: 0.5
    min_closed_trades: 30
    min_profit_factor_before_leaving_safety_mode: 1.02
    min_avg_win_loss_ratio: 1.0
