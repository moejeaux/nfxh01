# Numeric thresholds for strategy directives — do not hardcode these in code paths.
engines:
  planned_count: 5
  acevault_engine_id: 1
  acevault:
    loss_pct: 0.03
    cooldown_hours: 4
  growi:
    loss_pct: 0.04
    cooldown_hours: 6
  mc:
    loss_pct: 0.02
    cooldown_hours: 2
  anticze:
    loss_pct: 0.02
    cooldown_hours: 8
  eternal:
    loss_pct: 0.02
    cooldown_hours: 12

acevault:
  default_position_size_usd: 25
  # Fixed distance from entry to stop (percent). Immutable after position creation; risk layer rejects widening.
  stop_loss_distance_pct: 0.3
  max_candidates: 5
  min_weakness_score: 0.3
  max_concurrent_positions: 5
  max_hold_minutes: 240
  cycle_interval_seconds: 15
  verification_size_usd: 50
  regime_weights:
    trending_up: 0.4
    trending_down: 0.9
    ranging: 0.6
    risk_off: 1.0

fathom:
  enabled: true
  # Per-exit post-trade blurbs (3b); six-hour strategy review uses fathom_retrospective.deep_model (14b).
  model: llama3.2:3b
  fast_model: llama3.2:3b
  post_analysis_timeout_seconds: 180
  timeout_seconds: 30
  acevault_max_mult: 1.5
  majors_max_mult: 2.0

fathom_retrospective:
  enabled: true
  deep_model: fathom-r1-14b
  lookback_hours: 6
  max_decision_rows: 200
  max_decisions_prompt_chars: 12000
  timeout_seconds: 600
  num_predict: 2048
  temperature: 0.2
  previous_runs_in_prompt: 1

regime:
  btc_1h_risk_off_threshold: -0.02
  btc_vol_risk_off_threshold: 0.008
  btc_4h_trend_threshold: 0.015
  btc_vol_trend_threshold: 0.006
  min_transition_interval_minutes: 15
  data_fetch_interval_seconds: 60

risk:
  # UnifiedRiskLayer is mandatory before any order reaches execution; no bypass flags.
  total_capital_usd: 10000
  max_portfolio_drawdown_24h: 0.05
  max_gross_multiplier: 1.5
  max_correlated_longs: 3
  min_available_capital_usd: 10.50
